tool: helix
upstream:
  type: github_release
  owner: helix-editor
  repo: helix
  tag_prefix: ""
  include_prerelease: false
  assets:
    - pattern: "helix-{version}-x86_64-windows.zip"
      platforms: [windows/x64]
    - pattern: "helix-{version}-x86_64-linux.tar.xz"
      platforms: [linux/x64]
    - pattern: "helix-{version}-aarch64-linux.tar.xz"
      platforms: [linux/arm64]
    - pattern: "helix-{version}-x86_64-macos.tar.xz"
      platforms: [macos/x64]
    - pattern: "helix-{version}-aarch64-macos.tar.xz"
      platforms: [macos/arm64]
tag_prefix: "helix-"
keep_versions: 0
license: MPL-2.0
source_url: https://github.com/helix-editor/helix
