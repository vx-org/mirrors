tool: worktrunk
upstream:
  type: github_release
  owner: max-sixty
  repo: worktrunk
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "worktrunk-x86_64-pc-windows-msvc.zip"
      platforms: [windows/x64]
    - pattern: "worktrunk-x86_64-unknown-linux-musl.tar.xz"
      platforms: [linux/x64]
    - pattern: "worktrunk-aarch64-unknown-linux-musl.tar.xz"
      platforms: [linux/arm64]
    - pattern: "worktrunk-x86_64-apple-darwin.tar.xz"
      platforms: [macos/x64]
    - pattern: "worktrunk-aarch64-apple-darwin.tar.xz"
      platforms: [macos/arm64]
tag_prefix: "worktrunk-"
keep_versions: 0
license: MIT
source_url: https://github.com/max-sixty/worktrunk
