tool: delta
upstream:
  type: github_release
  owner: dandavison
  repo: delta
  tag_prefix: ""
  include_prerelease: false
  assets:
    - pattern: "delta-{version}-x86_64-pc-windows-msvc.zip"
      platforms: [windows/x64]
    - pattern: "delta-{version}-x86_64-unknown-linux-gnu.tar.gz"
      platforms: [linux/x64]
    - pattern: "delta-{version}-aarch64-unknown-linux-gnu.tar.gz"
      platforms: [linux/arm64]
    - pattern: "delta-{version}-x86_64-apple-darwin.tar.gz"
      platforms: [macos/x64]
    - pattern: "delta-{version}-aarch64-apple-darwin.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "delta-"
keep_versions: 0
license: MIT
source_url: https://github.com/dandavison/delta
