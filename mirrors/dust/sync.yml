tool: dust
upstream:
  type: github_release
  owner: bootandy
  repo: dust
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "dust-v{version}-x86_64-pc-windows-msvc.zip"
      platforms: [windows/x64]
    - pattern: "dust-v{version}-x86_64-unknown-linux-gnu.tar.gz"
      platforms: [linux/x64]
    - pattern: "dust-v{version}-aarch64-unknown-linux-gnu.tar.gz"
      platforms: [linux/arm64]
    - pattern: "dust-v{version}-x86_64-apple-darwin.tar.gz"
      platforms: [macos/x64]
    - pattern: "dust-v{version}-aarch64-apple-darwin.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "dust-"
keep_versions: 0
license: MIT
source_url: https://github.com/bootandy/dust
