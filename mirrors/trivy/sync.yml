# trivy — aquasecurity org has IP allowlist that blocks GitHub Actions runners
# Cannot sync via standard gh api. Use direct download URL instead.
tool: trivy
upstream:
  type: github_release_direct
  owner: aquasecurity
  repo: trivy
  tag_prefix: "v"
  include_prerelease: false
  # Use unauthenticated archive URL (bypasses org IP allowlist)
  use_archive_api: true
  assets:
    - pattern: "trivy_{version}_windows-64bit.zip"
      platforms: [windows/x64]
    - pattern: "trivy_{version}_Linux-64bit.tar.gz"
      platforms: [linux/x64]
    - pattern: "trivy_{version}_Linux-ARM64.tar.gz"
      platforms: [linux/arm64]
    - pattern: "trivy_{version}_macOS-64bit.tar.gz"
      platforms: [macos/x64]
    - pattern: "trivy_{version}_macOS-ARM64.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "trivy-"
keep_versions: 0
license: Apache-2.0
source_url: https://github.com/aquasecurity/trivy
