name: Sync Mirrors

# Permanently archives ALL versions of each tool's releases.
# New releases are detected nightly; existing mirror releases are never deleted.

on:
  schedule:
    # Nightly at 02:00 UTC
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      tool:
        description: "Tool name to sync (leave empty for all)"
        required: false
        default: ""
      force:
        description: "Force re-sync even if release already exists"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]
      dry_run:
        description: "Dry run (no releases created)"
        required: false
        default: "false"
        type: choice
        options: ["false", "true"]

permissions:
  contents: write

jobs:
  # -------------------------------------------------------------------------
  # Discover which tools to sync and build the job matrix
  # -------------------------------------------------------------------------
  discover:
    name: Discover tools
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.build.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4.2.2

      - name: Build sync matrix
        id: build
        env:
          TOOL_FILTER: ${{ github.event.inputs.tool }}
        run: |
          items=()
          while IFS= read -r cfg; do
            tool=$(grep "^tool:" "$cfg" | sed 's/tool:[[:space:]]*//')
            if [[ -z "$TOOL_FILTER" || "$tool" == "$TOOL_FILTER" ]]; then
              items+=("{\"config\":\"$cfg\",\"tool\":\"$tool\"}")
            fi
          done < <(find mirrors -name "sync.yml" | sort)

          if [[ ${#items[@]} -eq 0 ]]; then
            echo "No tools found to sync." >&2
            echo 'matrix={"include":[]}' >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Use EOF delimiter to safely write multi-line JSON
          json=$(printf '%s\n' "${items[@]}" | jq -sc '{"include": .}')
          echo "matrix<<EOF" >> "$GITHUB_OUTPUT"
          echo "$json"       >> "$GITHUB_OUTPUT"
          echo "EOF"         >> "$GITHUB_OUTPUT"

          echo "Matrix: $json"

  # -------------------------------------------------------------------------
  # Sync each tool — max 8 parallel to stay under GitHub API rate limits
  # -------------------------------------------------------------------------
  sync:
    name: "Sync ${{ matrix.tool }}"
    needs: discover
    if: ${{ needs.discover.outputs.matrix != '{"include":[]}' }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      max-parallel: 8          # 129 tools ÷ 8 = ~16 waves, avoids rate limit
      matrix: ${{ fromJson(needs.discover.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4.2.2

      - name: "Sync ${{ matrix.tool }}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          FORCE:    ${{ github.event.inputs.force == 'true' && '1' || '0' }}
          DRY_RUN:  ${{ github.event.inputs.dry_run == 'true' && '1' || '0' }}
        run: |
          # Random jitter 0-30s to spread out GitHub API calls across the 8 parallel jobs
          sleep $((RANDOM % 30))
          python scripts/sync-tool.py "${{ matrix.config }}"
