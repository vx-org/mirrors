tool: fzf
upstream:
  type: github_release
  owner: junegunn
  repo: fzf
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "fzf-{version}-windows_amd64.zip"
      platforms: [windows/x64]
    - pattern: "fzf-{version}-linux_amd64.tar.gz"
      platforms: [linux/x64]
    - pattern: "fzf-{version}-linux_arm64.tar.gz"
      platforms: [linux/arm64]
    - pattern: "fzf-{version}-darwin_amd64.tar.gz"
      platforms: [macos/x64]
    - pattern: "fzf-{version}-darwin_arm64.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "fzf-"
keep_versions: 0
license: MIT
source_url: https://github.com/junegunn/fzf
