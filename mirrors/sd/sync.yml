tool: sd
upstream:
  type: github_release
  owner: chmln
  repo: sd
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "sd-v{version}-x86_64-pc-windows-msvc.zip"
      platforms: [windows/x64]
    - pattern: "sd-v{version}-x86_64-unknown-linux-gnu.tar.gz"
      platforms: [linux/x64]
    - pattern: "sd-v{version}-aarch64-unknown-linux-musl.tar.gz"
      platforms: [linux/arm64]
    - pattern: "sd-v{version}-x86_64-apple-darwin.tar.gz"
      platforms: [macos/x64]
    - pattern: "sd-v{version}-aarch64-apple-darwin.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "sd-"
keep_versions: 0
license: MIT
source_url: https://github.com/chmln/sd
