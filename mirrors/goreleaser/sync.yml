tool: goreleaser
upstream:
  type: github_release
  owner: goreleaser
  repo: goreleaser
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "goreleaser_Windows_x86_64.zip"
      platforms: [windows/x64]
    - pattern: "goreleaser_Linux_x86_64.tar.gz"
      platforms: [linux/x64]
    - pattern: "goreleaser_Linux_arm64.tar.gz"
      platforms: [linux/arm64]
    - pattern: "goreleaser_Darwin_x86_64.tar.gz"
      platforms: [macos/x64]
    - pattern: "goreleaser_Darwin_arm64.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "goreleaser-"
keep_versions: 0
license: MIT
source_url: https://github.com/goreleaser/goreleaser
