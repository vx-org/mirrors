# TODO: vercel/turbo has no GitHub releases (uses npm distribution), verify asset pattern
tool: turbo
upstream:
  type: github_release
  owner: vercel
  repo: turbo
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "turbo-windows-64.exe"
      platforms: [windows/x64]
    - pattern: "turbo-linux-64"
      platforms: [linux/x64]
    - pattern: "turbo-linux-arm64"
      platforms: [linux/arm64]
    - pattern: "turbo-darwin-64"
      platforms: [macos/x64]
    - pattern: "turbo-darwin-arm64"
      platforms: [macos/arm64]
tag_prefix: "turbo-"
keep_versions: 0
license: MIT
source_url: https://github.com/vercel/turbo
