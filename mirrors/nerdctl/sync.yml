tool: nerdctl
upstream:
  type: github_release
  owner: containerd
  repo: nerdctl
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "nerdctl-{version}-windows-amd64.tar.gz"
      platforms: [windows/x64]
    - pattern: "nerdctl-{version}-linux-amd64.tar.gz"
      platforms: [linux/x64]
    - pattern: "nerdctl-{version}-linux-arm64.tar.gz"
      platforms: [linux/arm64]
tag_prefix: "nerdctl-"
keep_versions: 0
license: Apache-2.0
source_url: https://github.com/containerd/nerdctl
