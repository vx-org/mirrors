tool: k9s
upstream:
  type: github_release
  owner: derailed
  repo: k9s
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "k9s_Windows_amd64.zip"
      platforms: [windows/x64]
    - pattern: "k9s_Linux_amd64.tar.gz"
      platforms: [linux/x64]
    - pattern: "k9s_Linux_arm64.tar.gz"
      platforms: [linux/arm64]
    - pattern: "k9s_Darwin_amd64.tar.gz"
      platforms: [macos/x64]
    - pattern: "k9s_Darwin_arm64.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "k9s-"
keep_versions: 0
license: Apache-2.0
source_url: https://github.com/derailed/k9s
