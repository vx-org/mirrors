tool: deno
upstream:
  type: github_release
  owner: denoland
  repo: deno
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "deno-x86_64-pc-windows-msvc.zip"
      platforms: [windows/x64]
    - pattern: "deno-x86_64-unknown-linux-gnu.zip"
      platforms: [linux/x64]
    - pattern: "deno-aarch64-unknown-linux-gnu.zip"
      platforms: [linux/arm64]
    - pattern: "deno-x86_64-apple-darwin.zip"
      platforms: [macos/x64]
    - pattern: "deno-aarch64-apple-darwin.zip"
      platforms: [macos/arm64]
tag_prefix: "deno-"
keep_versions: 0
license: MIT
source_url: https://github.com/denoland/deno
