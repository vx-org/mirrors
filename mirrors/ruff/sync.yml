tool: ruff
upstream:
  type: github_release
  owner: astral-sh
  repo: ruff
  tag_prefix: ""
  include_prerelease: false
  assets:
    - pattern: "ruff-x86_64-pc-windows-msvc.zip"
      platforms: [windows/x64]
    - pattern: "ruff-x86_64-unknown-linux-gnu.tar.gz"
      platforms: [linux/x64]
    - pattern: "ruff-aarch64-unknown-linux-gnu.tar.gz"
      platforms: [linux/arm64]
    - pattern: "ruff-x86_64-apple-darwin.tar.gz"
      platforms: [macos/x64]
    - pattern: "ruff-aarch64-apple-darwin.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "ruff-"
keep_versions: 0
license: MIT
source_url: https://github.com/astral-sh/ruff
