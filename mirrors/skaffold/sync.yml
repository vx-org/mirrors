tool: skaffold
upstream:
  type: github_release
  owner: GoogleContainerTools
  repo: skaffold
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "skaffold-windows-amd64.exe"
      platforms: [windows/x64]
    - pattern: "skaffold-linux-amd64"
      platforms: [linux/x64]
    - pattern: "skaffold-linux-arm64"
      platforms: [linux/arm64]
    - pattern: "skaffold-darwin-amd64"
      platforms: [macos/x64]
    - pattern: "skaffold-darwin-arm64"
      platforms: [macos/arm64]
tag_prefix: "skaffold-"
keep_versions: 0
license: Apache-2.0
source_url: https://github.com/GoogleContainerTools/skaffold
