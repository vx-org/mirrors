# TODO: starship-rs/starship releases API returned 404, verify repo name
tool: starship
upstream:
  type: github_release
  owner: starship-rs
  repo: starship
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "starship-x86_64-pc-windows-msvc.zip"
      platforms: [windows/x64]
    - pattern: "starship-x86_64-unknown-linux-gnu.tar.gz"
      platforms: [linux/x64]
    - pattern: "starship-aarch64-unknown-linux-gnu.tar.gz"
      platforms: [linux/arm64]
    - pattern: "starship-x86_64-apple-darwin.tar.gz"
      platforms: [macos/x64]
    - pattern: "starship-aarch64-apple-darwin.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "starship-"
keep_versions: 0
license: ISC
source_url: https://github.com/starship-rs/starship
