# TODO: XAMPPRocky/tokei v14.0.0 has no release assets yet, verify when published
tool: tokei
upstream:
  type: github_release
  owner: XAMPPRocky
  repo: tokei
  tag_prefix: ""
  include_prerelease: false
  assets:
    - pattern: "tokei-x86_64-pc-windows-msvc.exe"
      platforms: [windows/x64]
    - pattern: "tokei-x86_64-unknown-linux-gnu.tar.gz"
      platforms: [linux/x64]
    - pattern: "tokei-aarch64-unknown-linux-gnu.tar.gz"
      platforms: [linux/arm64]
    - pattern: "tokei-x86_64-apple-darwin.tar.gz"
      platforms: [macos/x64]
    - pattern: "tokei-aarch64-apple-darwin.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "tokei-"
keep_versions: 0
license: MIT
source_url: https://github.com/XAMPPRocky/tokei
