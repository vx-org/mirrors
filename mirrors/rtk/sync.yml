# rtk — AI workflow CLI tool from rtk-ai
# https://github.com/rtk-ai/rtk
#
# Assets (v0.38.0):
#   Windows x64: rtk-x86_64-pc-windows-msvc.zip
#   Linux x64:   rtk-x86_64-unknown-linux-musl.tar.gz
#   Linux arm64: rtk-aarch64-unknown-linux-gnu.tar.gz
#   macOS x64:   rtk-x86_64-apple-darwin.tar.gz
#   macOS arm64: rtk-aarch64-apple-darwin.tar.gz

tool: rtk
upstream:
  type: github_release
  owner: rtk-ai
  repo: rtk
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "rtk-x86_64-pc-windows-msvc.zip"
      platforms: [windows/x64]
    - pattern: "rtk-x86_64-unknown-linux-musl.tar.gz"
      platforms: [linux/x64]
    - pattern: "rtk-aarch64-unknown-linux-gnu.tar.gz"
      platforms: [linux/arm64]
    - pattern: "rtk-x86_64-apple-darwin.tar.gz"
      platforms: [macos/x64]
    - pattern: "rtk-aarch64-apple-darwin.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "rtk-"
keep_versions: 0
license: MIT
source_url: https://github.com/rtk-ai/rtk
