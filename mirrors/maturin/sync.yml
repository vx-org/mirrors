tool: maturin
upstream:
  type: github_release
  owner: PyO3
  repo: maturin
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "maturin-x86_64-pc-windows-msvc.zip"
      platforms: [windows/x64]
    - pattern: "maturin-x86_64-unknown-linux-musl.tar.gz"
      platforms: [linux/x64]
    - pattern: "maturin-aarch64-unknown-linux-musl.tar.gz"
      platforms: [linux/arm64]
    - pattern: "maturin-x86_64-apple-darwin.tar.gz"
      platforms: [macos/x64]
    - pattern: "maturin-aarch64-apple-darwin.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "maturin-"
keep_versions: 0
license: MIT
source_url: https://github.com/PyO3/maturin
