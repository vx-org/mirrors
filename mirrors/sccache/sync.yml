tool: sccache
upstream:
  type: github_release
  owner: mozilla
  repo: sccache
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "sccache-v{version}-x86_64-pc-windows-msvc.zip"
      platforms: [windows/x64]
    - pattern: "sccache-v{version}-x86_64-unknown-linux-musl.tar.gz"
      platforms: [linux/x64]
    - pattern: "sccache-v{version}-aarch64-unknown-linux-musl.tar.gz"
      platforms: [linux/arm64]
    - pattern: "sccache-v{version}-x86_64-apple-darwin.tar.gz"
      platforms: [macos/x64]
    - pattern: "sccache-v{version}-aarch64-apple-darwin.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "sccache-"
keep_versions: 0
license: Apache-2.0
source_url: https://github.com/mozilla/sccache
