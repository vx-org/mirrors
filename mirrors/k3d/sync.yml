tool: k3d
upstream:
  type: github_release
  owner: k3d-io
  repo: k3d
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "k3d-windows-amd64.exe"
      platforms: [windows/x64]
    - pattern: "k3d-linux-amd64"
      platforms: [linux/x64]
    - pattern: "k3d-linux-arm64"
      platforms: [linux/arm64]
    - pattern: "k3d-darwin-amd64"
      platforms: [macos/x64]
    - pattern: "k3d-darwin-arm64"
      platforms: [macos/arm64]
tag_prefix: "k3d-"
keep_versions: 0
license: MIT
source_url: https://github.com/k3d-io/k3d
