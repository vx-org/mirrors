tool: llvm
upstream:
  type: github_release
  owner: llvm
  repo: llvm-project
  tag_prefix: "llvmorg-"
  include_prerelease: false
  assets:
    - pattern: "LLVM-{version}-Windows-X64.exe"
      platforms: [windows/x64]
    - pattern: "LLVM-{version}-Linux-X64.tar.xz"
      platforms: [linux/x64]
    - pattern: "LLVM-{version}-Linux-AArch64.tar.xz"
      platforms: [linux/arm64]
    - pattern: "LLVM-{version}-macOS-X64.tar.xz"
      platforms: [macos/x64]
    - pattern: "LLVM-{version}-macOS-ARM64.tar.xz"
      platforms: [macos/arm64]
tag_prefix: "llvm-"
keep_versions: 0
license: Apache-2.0
source_url: https://github.com/llvm/llvm-project
