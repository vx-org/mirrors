tool: just
upstream:
  type: github_release
  owner: casey
  repo: just
  tag_prefix: ""
  include_prerelease: false
  assets:
    - pattern: "just-{version}-x86_64-pc-windows-msvc.zip"
      platforms: [windows/x64]
    - pattern: "just-{version}-x86_64-unknown-linux-musl.tar.gz"
      platforms: [linux/x64]
    - pattern: "just-{version}-aarch64-unknown-linux-musl.tar.gz"
      platforms: [linux/arm64]
    - pattern: "just-{version}-x86_64-apple-darwin.tar.gz"
      platforms: [macos/x64]
    - pattern: "just-{version}-aarch64-apple-darwin.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "just-"
keep_versions: 0
license: MIT
source_url: https://github.com/casey/just
