tool: buildcache
upstream:
  type: github_release
  owner: mbitsnbites
  repo: buildcache
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "buildcache-windows.zip"
      platforms: [windows/x64]
    - pattern: "buildcache-linux.tar.gz"
      platforms: [linux/x64]
    - pattern: "buildcache-macos.zip"
      platforms: [macos/x64, macos/arm64]
tag_prefix: "buildcache-"
keep_versions: 0
license: MIT
source_url: https://github.com/mbitsnbites/buildcache
