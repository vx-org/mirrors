tool: xh
upstream:
  type: github_release
  owner: ducaale
  repo: xh
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "xh-v{version}-x86_64-pc-windows-msvc.zip"
      platforms: [windows/x64]
    - pattern: "xh-v{version}-x86_64-unknown-linux-musl.tar.gz"
      platforms: [linux/x64]
    - pattern: "xh-v{version}-aarch64-unknown-linux-musl.tar.gz"
      platforms: [linux/arm64]
    - pattern: "xh-v{version}-x86_64-apple-darwin.tar.gz"
      platforms: [macos/x64]
    - pattern: "xh-v{version}-aarch64-apple-darwin.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "xh-"
keep_versions: 0
license: MIT
source_url: https://github.com/ducaale/xh
