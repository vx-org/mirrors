tool: zellij
upstream:
  type: github_release
  owner: zellij-org
  repo: zellij
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "zellij-x86_64-pc-windows-msvc.zip"
      platforms: [windows/x64]
    - pattern: "zellij-x86_64-unknown-linux-musl.tar.gz"
      platforms: [linux/x64]
    - pattern: "zellij-aarch64-unknown-linux-musl.tar.gz"
      platforms: [linux/arm64]
    - pattern: "zellij-x86_64-apple-darwin.tar.gz"
      platforms: [macos/x64]
    - pattern: "zellij-aarch64-apple-darwin.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "zellij-"
keep_versions: 0
license: MIT
source_url: https://github.com/zellij-org/zellij
