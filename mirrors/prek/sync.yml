# TODO: loonghao/prek has no GitHub releases yet. verify asset pattern when available
tool: prek
upstream:
  type: github_release
  owner: loonghao
  repo: prek
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "prek-x86_64-pc-windows-msvc.zip"
      platforms: [windows/x64]
    - pattern: "prek-x86_64-unknown-linux-gnu.tar.gz"
      platforms: [linux/x64]
    - pattern: "prek-aarch64-unknown-linux-gnu.tar.gz"
      platforms: [linux/arm64]
    - pattern: "prek-x86_64-apple-darwin.tar.gz"
      platforms: [macos/x64]
    - pattern: "prek-aarch64-apple-darwin.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "prek-"
keep_versions: 0
license: MIT
source_url: https://github.com/loonghao/prek
