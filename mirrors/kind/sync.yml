tool: kind
upstream:
  type: github_release
  owner: kubernetes-sigs
  repo: kind
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "kind-windows-amd64"
      platforms: [windows/x64]
    - pattern: "kind-linux-amd64"
      platforms: [linux/x64]
    - pattern: "kind-linux-arm64"
      platforms: [linux/arm64]
    - pattern: "kind-darwin-amd64"
      platforms: [macos/x64]
    - pattern: "kind-darwin-arm64"
      platforms: [macos/arm64]
tag_prefix: "kind-"
keep_versions: 0
license: Apache-2.0
source_url: https://github.com/kubernetes-sigs/kind
