tool: oxlint
upstream:
  type: github_release
  owner: oxc-project
  repo: oxc
  tag_prefix: "oxlint_v"
  include_prerelease: false
  assets:
    - pattern: "oxfmt-x86_64-pc-windows-msvc.zip"
      platforms: [windows/x64]
    - pattern: "oxfmt-x86_64-unknown-linux-gnu.tar.gz"
      platforms: [linux/x64]
    - pattern: "oxfmt-aarch64-unknown-linux-gnu.tar.gz"
      platforms: [linux/arm64]
    - pattern: "oxfmt-x86_64-apple-darwin.tar.gz"
      platforms: [macos/x64]
    - pattern: "oxfmt-aarch64-apple-darwin.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "oxlint-"
keep_versions: 0
license: MIT
source_url: https://github.com/oxc-project/oxc
