tool: biome
upstream:
  type: github_release
  owner: biomejs
  repo: biome
  tag_prefix: "cli/v"
  include_prerelease: false
  assets:
    - pattern: "biome-win32-x64.exe"
      platforms: [windows/x64]
    - pattern: "biome-linux-x64"
      platforms: [linux/x64]
    - pattern: "biome-linux-arm64"
      platforms: [linux/arm64]
    - pattern: "biome-darwin-x64"
      platforms: [macos/x64]
    - pattern: "biome-darwin-arm64"
      platforms: [macos/arm64]
tag_prefix: "biome-"
keep_versions: 0
license: MIT
source_url: https://github.com/biomejs/biome
