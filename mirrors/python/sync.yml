# Mirror config for Python (cpython)
#
# Source: astral-sh/python-build-standalone
# Official: https://www.python.org
#
# Uses github_release_direct to bypass API rate limits on large repos.
# Each release tag (e.g. 20260504) contains assets for all Python versions.
# We construct download URLs directly without fetching the releases API.
#
# Asset format: cpython-{pyver}+{build_tag}-{triple}-install_only_stripped.tar.gz

tool: python
upstream:
  type: python_standalone
  owner: astral-sh
  repo: python-build-standalone
  # Python versions to mirror from python-build-standalone
  python_versions: ["3.8", "3.9", "3.10", "3.11", "3.12", "3.13"]
  platforms:
    - triple: "x86_64-pc-windows-msvc"
      os: windows
      arch: x64
      ext: ".tar.gz"
    - triple: "x86_64-unknown-linux-gnu"
      os: linux
      arch: x64
      ext: ".tar.gz"
    - triple: "aarch64-unknown-linux-gnu"
      os: linux
      arch: arm64
      ext: ".tar.gz"
    - triple: "x86_64-apple-darwin"
      os: macos
      arch: x64
      ext: ".tar.gz"
    - triple: "aarch64-apple-darwin"
      os: macos
      arch: arm64
      ext: ".tar.gz"
  # EOL versions are no longer available from python-build-standalone.
  # Mirror official CPython assets from Aliyun first, then python.org as fallback.
  legacy_releases:
    - version: "3.7.9"
      assets:
        - name: "python-{version}-source.tar.xz"
          urls:
            - "https://mirrors.aliyun.com/python-release/source/Python-{version}.tar.xz"
            - "https://www.python.org/ftp/python/{version}/Python-{version}.tar.xz"
        - name: "python-{version}-windows-x64.exe"
          urls:
            - "https://mirrors.aliyun.com/python-release/windows/python-{version}-amd64.exe"
            - "https://www.python.org/ftp/python/{version}/python-{version}-amd64.exe"
        - name: "python-{version}-macos-x64.pkg"
          urls:
            - "https://mirrors.aliyun.com/python-release/macos/python-{version}-macosx10.9.pkg"
            - "https://www.python.org/ftp/python/{version}/python-{version}-macosx10.9.pkg"
    - version: "2.7.18"
      assets:
        - name: "python-{version}-source.tar.xz"
          urls:
            - "https://mirrors.aliyun.com/python-release/source/Python-{version}.tar.xz"
            - "https://www.python.org/ftp/python/{version}/Python-{version}.tar.xz"
        - name: "python-{version}-windows-x64.msi"
          urls:
            - "https://mirrors.aliyun.com/python-release/windows/python-{version}.amd64.msi"
            - "https://www.python.org/ftp/python/{version}/python-{version}.amd64.msi"
        - name: "python-{version}-macos-x64.pkg"
          urls:
            - "https://mirrors.aliyun.com/python-release/macos/python-{version}-macosx10.9.pkg"
            - "https://www.python.org/ftp/python/{version}/python-{version}-macosx10.9.pkg"

tag_prefix: "python-"
keep_versions: 0
license: PSF-2.0
source_url: https://www.python.org
