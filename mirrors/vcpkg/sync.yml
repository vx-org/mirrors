# TODO: microsoft/vcpkg has no binary releases (source-only), verify asset pattern
tool: vcpkg
upstream:
  type: github_release
  owner: microsoft
  repo: vcpkg
  tag_prefix: ""
  include_prerelease: false
  assets:
    - pattern: "vcpkg-tool-windows-x64.exe"
      platforms: [windows/x64]
    - pattern: "vcpkg-tool-linux-x64"
      platforms: [linux/x64]
    - pattern: "vcpkg-tool-osx-x64"
      platforms: [macos/x64]
    - pattern: "vcpkg-tool-osx-arm64"
      platforms: [macos/arm64]
tag_prefix: "vcpkg-"
keep_versions: 0
license: MIT
source_url: https://github.com/microsoft/vcpkg
