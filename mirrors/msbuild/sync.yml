# TODO: microsoft/msbuild uses NuGet not GitHub releases for binary distribution
tool: msbuild
upstream:
  type: github_release
  owner: microsoft
  repo: msbuild
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "MSBuild.{version}.zip"
      platforms: [windows/x64]
tag_prefix: "msbuild-"
keep_versions: 0
license: MIT
source_url: https://github.com/microsoft/msbuild
