tool: sops
upstream:
  type: github_release
  owner: getsops
  repo: sops
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "sops-v{version}.amd64.exe"
      platforms: [windows/x64]
    - pattern: "sops-v{version}.linux.amd64"
      platforms: [linux/x64]
    - pattern: "sops-v{version}.linux.arm64"
      platforms: [linux/arm64]
    - pattern: "sops-v{version}.darwin.amd64"
      platforms: [macos/x64]
    - pattern: "sops-v{version}.darwin.arm64"
      platforms: [macos/arm64]
tag_prefix: "sops-"
keep_versions: 0
license: MPL-2.0
source_url: https://github.com/getsops/sops
