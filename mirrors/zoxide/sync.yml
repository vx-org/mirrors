tool: zoxide
upstream:
  type: github_release
  owner: ajeetdsouza
  repo: zoxide
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "zoxide-{version}-x86_64-pc-windows-msvc.zip"
      platforms: [windows/x64]
    - pattern: "zoxide-{version}-x86_64-unknown-linux-musl.tar.gz"
      platforms: [linux/x64]
    - pattern: "zoxide-{version}-aarch64-unknown-linux-musl.tar.gz"
      platforms: [linux/arm64]
    - pattern: "zoxide-{version}-x86_64-apple-darwin.tar.gz"
      platforms: [macos/x64]
    - pattern: "zoxide-{version}-aarch64-apple-darwin.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "zoxide-"
keep_versions: 0
license: MIT
source_url: https://github.com/ajeetdsouza/zoxide
