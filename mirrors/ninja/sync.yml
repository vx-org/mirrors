tool: ninja
upstream:
  type: github_release
  owner: ninja-build
  repo: ninja
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "ninja-win.zip"
      platforms: [windows/x64]
    - pattern: "ninja-linux.zip"
      platforms: [linux/x64]
    - pattern: "ninja-linux-aarch64.zip"
      platforms: [linux/arm64]
    - pattern: "ninja-mac.zip"
      platforms: [macos/x64, macos/arm64]
tag_prefix: "ninja-"
keep_versions: 0
license: Apache-2.0
source_url: https://github.com/ninja-build/ninja
