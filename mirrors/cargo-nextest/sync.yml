tool: cargo-nextest
upstream:
  type: github_release
  owner: nextest-rs
  repo: nextest
  tag_prefix: "cargo-nextest-"
  include_prerelease: false
  assets:
    - pattern: "cargo-nextest-{version}-x86_64-pc-windows-msvc.zip"
      platforms: [windows/x64]
    - pattern: "cargo-nextest-{version}-x86_64-unknown-linux-gnu.tar.gz"
      platforms: [linux/x64]
    - pattern: "cargo-nextest-{version}-aarch64-unknown-linux-gnu.tar.gz"
      platforms: [linux/arm64]
    - pattern: "cargo-nextest-{version}-x86_64-apple-darwin.tar.gz"
      platforms: [macos/x64]
    - pattern: "cargo-nextest-{version}-aarch64-apple-darwin.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "cargo-nextest-"
keep_versions: 0
license: MIT
source_url: https://github.com/nextest-rs/nextest
