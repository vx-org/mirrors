# Note: zig release assets use separate naming scheme
# ziglang/zig releases bootstrap source, actual binaries from ziglang.org/download
tool: zig
upstream:
  type: github_release
  owner: ziglang
  repo: zig
  tag_prefix: ""
  include_prerelease: false
  assets:
    - pattern: "zig-windows-x86_64-{version}.zip"
      platforms: [windows/x64]
    - pattern: "zig-linux-x86_64-{version}.tar.xz"
      platforms: [linux/x64]
    - pattern: "zig-linux-aarch64-{version}.tar.xz"
      platforms: [linux/arm64]
    - pattern: "zig-macos-x86_64-{version}.tar.xz"
      platforms: [macos/x64]
    - pattern: "zig-macos-aarch64-{version}.tar.xz"
      platforms: [macos/arm64]
tag_prefix: "zig-"
keep_versions: 0
license: MIT
source_url: https://github.com/ziglang/zig
