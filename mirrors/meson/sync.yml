tool: meson
upstream:
  type: github_release
  owner: mesonbuild
  repo: meson
  tag_prefix: ""
  include_prerelease: false
  assets:
    - pattern: "meson-{version}-py3-none-any.whl"
      platforms: [windows/x64, linux/x64, linux/arm64, macos/x64, macos/arm64]
    - pattern: "meson.pyz"
      platforms: [windows/x64, linux/x64, linux/arm64, macos/x64, macos/arm64]
tag_prefix: "meson-"
keep_versions: 0
license: Apache-2.0
source_url: https://github.com/mesonbuild/meson
