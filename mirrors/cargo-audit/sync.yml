tool: cargo-audit
upstream:
  type: github_release
  owner: rustsec
  repo: rustsec
  tag_prefix: "cargo-audit/v"
  include_prerelease: false
  assets:
    - pattern: "cargo-audit-x86_64-pc-windows-msvc-v{version}.zip"
      platforms: [windows/x64]
    - pattern: "cargo-audit-x86_64-unknown-linux-gnu-v{version}.tgz"
      platforms: [linux/x64]
    - pattern: "cargo-audit-aarch64-unknown-linux-gnu-v{version}.tgz"
      platforms: [linux/arm64]
    - pattern: "cargo-audit-x86_64-apple-darwin-v{version}.tgz"
      platforms: [macos/x64]
    - pattern: "cargo-audit-aarch64-apple-darwin-v{version}.tgz"
      platforms: [macos/arm64]
tag_prefix: "cargo-audit-"
keep_versions: 0
license: MIT
source_url: https://github.com/rustsec/rustsec
