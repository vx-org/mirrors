tool: atuin
upstream:
  type: github_release
  owner: atuinsh
  repo: atuin
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "atuin-x86_64-pc-windows-msvc.zip"
      platforms: [windows/x64]
    - pattern: "atuin-x86_64-unknown-linux-gnu.tar.gz"
      platforms: [linux/x64]
    - pattern: "atuin-aarch64-unknown-linux-gnu.tar.gz"
      platforms: [linux/arm64]
    - pattern: "atuin-x86_64-apple-darwin.tar.gz"
      platforms: [macos/x64]
    - pattern: "atuin-aarch64-apple-darwin.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "atuin-"
keep_versions: 0
license: MIT
source_url: https://github.com/atuinsh/atuin
