# Zig binaries are published in https://ziglang.org/download/index.json.
# File naming changed in 0.14.1 from zig-{os}-{arch}-{version}
# to zig-{arch}-{os}-{version}; use tarball URLs from the index directly.
tool: zig
upstream:
  type: zig_download_index
  index_url: https://ziglang.org/download/index.json
  platforms:
    - x86_64-windows
    - x86_64-linux
    - aarch64-linux
    - x86_64-macos
    - aarch64-macos
tag_prefix: "zig-"
keep_versions: 0
license: MIT
source_url: https://ziglang.org/download
