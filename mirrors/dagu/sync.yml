tool: dagu
upstream:
  type: github_release
  owner: dagu-org
  repo: dagu
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "dagu_{version}_windows_amd64.zip"
      platforms: [windows/x64]
    - pattern: "dagu_{version}_linux_amd64.tar.gz"
      platforms: [linux/x64]
    - pattern: "dagu_{version}_linux_arm64.tar.gz"
      platforms: [linux/arm64]
    - pattern: "dagu_{version}_darwin_amd64.tar.gz"
      platforms: [macos/x64]
    - pattern: "dagu_{version}_darwin_arm64.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "dagu-"
keep_versions: 0
license: GPL-3.0
source_url: https://github.com/dagu-org/dagu
