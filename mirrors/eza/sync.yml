tool: eza
upstream:
  type: github_release
  owner: eza-community
  repo: eza
  tag_prefix: "v"
  include_prerelease: false
  assets:
    - pattern: "eza.exe_x86_64-pc-windows-gnu.zip"
      platforms: [windows/x64]
    - pattern: "eza_x86_64-unknown-linux-gnu.tar.gz"
      platforms: [linux/x64]
    - pattern: "eza_aarch64-unknown-linux-gnu.tar.gz"
      platforms: [linux/arm64]
    - pattern: "eza_x86_64-apple-darwin.tar.gz"
      platforms: [macos/x64]
    - pattern: "eza_aarch64-apple-darwin.tar.gz"
      platforms: [macos/arm64]
tag_prefix: "eza-"
keep_versions: 0
license: MIT
source_url: https://github.com/eza-community/eza
