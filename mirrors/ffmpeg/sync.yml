# Mirror config for ffmpeg
#
# Official source: https://ffmpeg.org/download.html
# Upstream builds: BtbN/FFmpeg-Builds (all assets live in the "latest" release)
#
# BtbN asset format (versioned builds):
#   ffmpeg-n{version}-latest-{platform}-lgpl-{version}.{ext}
#
# We mirror each versioned variant independently with tag: ffmpeg-{version}
# This ensures permanent per-version archiving.
#
# Platforms mirrored:
#   win64           ffmpeg-n{v}-latest-win64-lgpl-{v}.zip
#   linux64         ffmpeg-n{v}-latest-linux64-lgpl-{v}.tar.xz
#   linuxarm64      ffmpeg-n{v}-latest-linuxarm64-lgpl-{v}.tar.xz

tool: ffmpeg
upstream:
  # Special mode: extract multiple versions from a single "latest" release
  type: btbn_ffmpeg
  owner: BtbN
  repo: FFmpeg-Builds
  release_tag: "latest"
  # Asset regex patterns (one per platform); {v} = captured version group
  asset_patterns:
    - regex: "ffmpeg-n(?P<version>[0-9.]+)-latest-win64-lgpl-[0-9.]+\\.zip"
      rename: "ffmpeg-{version}-win64-lgpl.zip"
    - regex: "ffmpeg-n(?P<version>[0-9.]+)-latest-linux64-lgpl-[0-9.]+\\.tar\\.xz"
      rename: "ffmpeg-{version}-linux64-lgpl.tar.xz"
    - regex: "ffmpeg-n(?P<version>[0-9.]+)-latest-linuxarm64-lgpl-[0-9.]+\\.tar\\.xz"
      rename: "ffmpeg-{version}-linuxarm64-lgpl.tar.xz"

tag_prefix: "ffmpeg-"
keep_versions: 0
license: LGPL-2.1
source_url: https://ffmpeg.org/download.html
upstream_license_url: https://github.com/BtbN/FFmpeg-Builds/blob/master/LICENSE
